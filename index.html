<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. 제공된 style.css의 폰트 및 변수 이식 */
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400; font-display: swap;
        }
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700; font-display: swap;
        }
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900; font-display: swap;
        }

        :root {
            --amber-200: #f2d04b;
            --amber-500: #d9a52e;
            --gray-100: #f5f5f5;
            --gray-400: #a3a3a3;
            --gray-900: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            background: transparent;
            font-family: 'Paperozi', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 2. 테스트.html의 구조 그대로 이식 */
        #am-root {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 0;
            width: 100%;
        }

        .statusTitlePill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            background: var(--amber-200);
            border-radius: 100px;
        }

        .statusTitlePill .dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
        }

        .statusTitlePill .titleText {
            font-size: 24px;
            font-weight: 900;
            color: var(--gray-900);
            line-height: 1;
        }

        .statusOptions {
            display: flex;
            gap: 12px;
        }

        .statusOption {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            height: 56px;
            border-radius: 16px;
            background: #fff;
            border: 2px solid var(--gray-100);
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-400);
            transition: all .2s ease;
            cursor: default;
        }

        /* 활성화 상태 디자인 (제공된 CSS) */
        .statusOption.activeOn {
            background: var(--amber-500) !important;
            border-color: var(--amber-500) !important;
            color: var(--gray-900) !important;
        }

        .statusOption.activeOff {
            background: var(--gray-900) !important;
            border-color: var(--gray-900) !important;
            color: #fff !important;
        }

        .statusOption:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

<section id="am-root">
    <div class="statusTitlePill">
        <span class="dot"></span>
        <span class="titleText">지금 연락 가능한가요?</span>
        <span class="dot"></span>
    </div>
    <div class="statusOptions">
        <div id="statusOn" class="statusOption">실시간 연락 가능</div>
        <div id="statusOff" class="statusOption">휴식 중</div>
    </div>
</section>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqXRrOMJ0yWGc2CFwdpe-MeAeStLoAYYSQiczW1rZRuOrzYDWZiN0DnHpiRIDIwXse9ykzlfNcB-tS/pub?output=csv';

    async function update() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const isOpen = text.split(',')[1].toUpperCase().includes('TRUE');

            const onBtn = document.getElementById('statusOn');
            const offBtn = document.getElementById('statusOff');

            if (isOpen) {
                onBtn.classList.add('activeOn');
                offBtn.classList.remove('activeOff');
            } else {
                offBtn.classList.add('activeOff');
                onBtn.classList.remove('activeOn');
            }
        } catch (e) { console.error('Status Sync Error'); }
    }

    update();
    setInterval(update, 15000);
</script>

</body>
</html>
