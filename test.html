<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현서이님-견적 계산기</title>

    <style>
        /* --- 폰트 설정 --- */
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }
        @font-face {
            font-family: 'Cafe24Surround';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --bg-page: #f3f3f3;
            --yellow-300: #ffd64f;
            --yellow-500: #f0b323;
            --brown-900: #4a3526;
            --text-primary: #3c2b1f;
            --text-secondary: #6b5a4a;
            --result-bg: #ffe082;
            --chip-active-bg: #5b4030;
            --unified-width: 140px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* [수정] 스크롤 차단 해제 및 스크롤바 허용 */
        html { 
            overflow-y: auto; /* 세로 스크롤 허용 */
            height: 100%;
        } 
        body {
            background: transparent;
            font-family: 'Cafe24Surround', sans-serif;
            color: var(--text-primary);
            padding: 15px 10px;
            line-height: 1.5;
            word-break: keep-all;
            min-height: 100%; /* 전체 높이 확보 */
        }

        .mainWrap { max-width: 845px; margin: 0 auto; }
        .sec { margin-bottom: 50px; width: 100%; }

        /* 제목 스타일 */
        .statusTitlePill {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 12px 24px; border-radius: 999px; background: var(--yellow-300);
            width: fit-content; margin: 0 auto 20px;
            font-family: 'Paperozi', sans-serif; font-weight: 900;
            font-size: clamp(22px, 5vw, 32px); letter-spacing: -0.02em;
        }
        .statusTitlePill .dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; }

        /* 컨테이너 박스 */
        .calcBox, .formBox {
            width: 100%; background: #ffedb8; border-radius: 18px; padding: 18px;
            box-shadow: inset 0 0 0 6px #ffdd77, inset 0 0 0 8px #ffb400;
        }

        /* 그리드 레이아웃 */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .pillField {
            background: #ffe28a; border-radius: 999px; padding: 10px 18px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; min-height: 54px;
        }
        .pillLabel { font-size: 16px; white-space: nowrap; }

        /* 입력창 디자인 통일 */
        .unified-box {
            width: var(--unified-width); height: 36px; background: #fff2c9;
            border: none; border-radius: 8px; font-family: 'Cafe24Surround', sans-serif;
            font-size: 14px; color: var(--text-primary); outline: none;
        }
        select.unified-box { padding: 0 10px; cursor: pointer; text-align-last: center; }

        /* 숫자 입력창 + 단위 */
        .input-with-text { display: flex; align-items: center; padding: 0 12px; }
        .input-with-text input {
            flex: 1; border: none; background: transparent; outline: none;
            text-align: right; font-family: inherit; font-size: 15px;
            color: inherit; padding-right: 4px; width: 100%;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* 추가 옵션 영역 */
        .extraWrap {
            margin-top: 10px; background: #ffe28a; border-radius: 18px; padding: 18px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .chips { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip {
            padding: 10px 16px; border-radius: 12px; background: #ffedb8;
            cursor: pointer; font-size: 14px; transition: 0.2s;
        }
        .chip.is-active { background: var(--chip-active-bg); color: #fff; }

        .subLine { display: flex; flex-direction: column; gap: 10px; }
        .collabWrap {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 18px; background: #ffedb8; border-radius: 14px;
        }

        /* 결과창 */
        .bottomRow { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 12px; margin-top: 20px; }
        .totalBox {
            background: var(--result-bg); border-radius: 14px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .totalValue { font-size: 20px; }
        .calcBtn {
            border: none; border-radius: 14px; background: var(--brown-900); color: #fff;
            font-family: 'Cafe24Surround', sans-serif; font-size: 17px; cursor: pointer;
            padding: 15px;
        }

        /* 문의 양식 */
        .formGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .formItem { background: #ffe28a; border-radius: 18px; padding: 18px; }
        .formItem--full { grid-column: 1 / -1; }
        .formLabel { margin-bottom: 10px; display: block; font-size: 18px; }
        .formHint { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.6; }
        .formInput, .formTextarea {
            width: 100%; border: none; border-radius: 12px; background: #fff2c9;
            padding: 14px; font-family: 'Cafe24Surround', sans-serif; font-size: 14px;
        }
        .formTextarea { resize: none; overflow-y: auto; }

        .formActions { display: flex; gap: 10px; margin-top: 15px; }
        .formBtn { flex: 1; height: 50px; border: none; border-radius: 12px; cursor: pointer; font-family: 'Cafe24Surround'; font-size: 16px; }
        .formBtn--dark { background: var(--brown-900); color: #fff; }
        .formBtn--ghost { background: #fff2c9; }

        .notice { font-size: 12px; color: var(--text-secondary); margin-top: 10px; text-align: center; }

        /* 모바일 최적화 미디어 쿼리 */
        @media (max-width: 768px) {
            .row, .formGrid, .bottomRow { grid-template-columns: 1fr; }
            .statusTitlePill { padding: 10px 20px; }
            .unified-box { width: 100%; max-width: none; }
            .pillField { 
                flex-direction: column; 
                align-items: flex-start; 
                height: auto; 
                padding: 15px 20px; 
                border-radius: 20px; 
                gap: 10px;
            }
            .pillLabel { font-size: 15px; }
        }
    </style>
</head>

<body>
    <div class="mainWrap">
        <section class="sec" id="calc">
            <div class="statusTitlePill">
                <span class="dot"></span><span>견적 계산기</span><span class="dot"></span>
            </div>

            <div class="calcBox">
                <div class="row">
                    <div class="pillField">
                        <div class="pillLabel">원본 영상 길이</div>
                        <select class="unified-box" id="rawMin">
                            <option value="">데이터 로딩중...</option>
                        </select>
                    </div>
                    <div class="pillField">
                        <div class="pillLabel">희망 영상 길이</div>
                        <div class="unified-box input-with-text">
                            <input id="finalMin" type="number" min="0" value="0"><span>분</span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="pillField">
                        <div class="pillLabel">희망 타입</div>
                        <select class="unified-box" id="package">
                            <option value="basic">스탠다드</option>
                            <option value="deluxe">디럭스</option>
                            <option value="premium" selected>프리미엄</option>
                            <option value="economy">알잘딱</option>
                        </select>
                    </div>
                    <div class="pillField">
                        <div class="pillLabel">편집점</div>
                        <select class="unified-box" id="editPoint">
                            <option value="O" selected>있음</option>
                            <option value="X">없음</option>
                        </select>
                    </div>
                </div>

                <div class="extraWrap">
                    <div class="pillLabel">추가금 항목</div>
                    <div class="chips" id="extraToggles">
                        <div class="chip" data-extra="포트폴리오 비공개">포트폴리오 비공개</div>
                        <div class="chip" data-extra="빠른 마감" data-group="rush">빠른 마감</div>
                        <div class="chip" data-extra="우선 마감" data-group="rush">우선 마감</div>
                    </div>
                    <div class="subLine">
                        <div class="collabWrap">
                            <span class="pillLabel" style="font-size:15px">시점 추가</span>
                            <select class="unified-box" id="momentVal">
                                <option value="0">0개</option><option value="1">1개</option><option value="2">2개</option><option value="3">3개</option><option value="4">4개</option><option value="5">5개</option><option value="6">6개</option><option value="7">7개</option><option value="8">8개</option><option value="9">9개</option><option value="10">10개</option>
                            </select>
                        </div>
                        <div class="collabWrap">
                            <span class="pillLabel" style="font-size:15px">합방 인원 추가</span>
                            <select class="unified-box" id="collabVal">
                                <option value="0">0명</option><option value="1">1명</option><option value="2">2명</option><option value="3">3명</option><option value="4">4명</option><option value="5">5명</option><option value="6">6명</option><option value="7">7명</option><option value="8">8명</option><option value="9">9명</option><option value="10">10명</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bottomRow">
                    <div class="totalBox"><span>총 예상 금액</span><span class="totalValue" id="totalText">0원</span></div>
                    <button class="calcBtn" id="calcBtn">최종 금액 확인하기</button>
                </div>
                <div class="notice">※ 여기에서 입력한 값은 아래 “문의 양식”에 자동으로 복사됩니다.</div>
            </div>
        </section>

        <section class="sec" id="form">
            <div class="statusTitlePill">
                <span class="dot"></span><span>문의 양식</span><span class="dot"></span>
            </div>

            <div class="formBox">
                <div class="formGrid">
                    <div class="formItem">
                        <label class="formLabel">유튜브 채널 링크</label>
                        <div class="formHint">업로드될 유튜브 채널 링크를 작성해 주세요.</div>
                        <input class="formInput" id="fChannel" type="url" placeholder="링크를 작성해주세요.">
                    </div>
                    <div class="formItem">
                        <label class="formLabel">원본 영상 공유</label>
                        <div class="formHint">드라이브 링크 등을 통해 공유해 주세요.</div>
                        <input class="formInput" id="fFinalLen" type="text" placeholder="드라이브 링크 등을 작성해주세요.">
                    </div>
                    <div class="formItem formItem--full">
                        <label class="formLabel">영상 콘셉트 및 레퍼런스 자료</label>
                        <textarea class="formTextarea" id="fConcept" rows="5"></textarea>
                    </div>
                    <div class="formItem formItem--full">
                        <label class="formLabel">그 외 요구사항</label>
                        <textarea class="formTextarea" id="fEtc" rows="4"></textarea>
                    </div>
                </div>
                <div class="formActions">
                    <button class="formBtn formBtn--dark" id="btnCopyForm">양식 복사하기</button>
                    <button class="formBtn formBtn--ghost" id="btnResetForm">초기화</button>
                </div>
                <p class="notice" id="formToast"></p>
            </div>
        </section>
    </div>

    <script>
        // 스크립트 부분은 기존 로직을 그대로 유지하되, 
        // iframe 연동용 height 전송 기능을 살려두어 어떤 환경에서도 호환되게 했습니다.
        function sendHeight() {
            const height = document.body.scrollHeight || document.documentElement.scrollHeight;
            window.parent.postMessage({ height: height }, '*');
        }

        const P1_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH8jUVjx9wTBIhjeeMpSD1g3F_HFetxJ11UvBqk30U8XVYurBlovsadmXPhYsEaTh-fNeKZCSuLf1K/pub?gid=483096933&single=true&output=csv";
        const P2_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH8jUVjx9wTBIhjeeMpSD1g3F_HFetxJ11UvBqk30U8XVYurBlovsadmXPhYsEaTh-fNeKZCSuLf1K/pub?gid=2058488740&single=true&output=csv";
        const P3_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH8jUVjx9wTBIhjeeMpSD1g3F_HFetxJ11UvBqk30U8XVYurBlovsadmXPhYsEaTh-fNeKZCSuLf1K/pub?gid=365920763&single=true&output=csv";

        let DB = { p1:[], p2:[], p3:[] };

        async function loadData() {
            try {
                const [r1, r2, r3] = await Promise.all([
                    fetch(P1_URL).then(r => r.text()),
                    fetch(P2_URL).then(r => r.text()),
                    fetch(P3_URL).then(r => r.text())
                ]);
                DB.p1 = parseCSV(r1); DB.p2 = parseCSV(r2); DB.p3 = parseCSV(r3);
                renderRawOptions();
                sendHeight();
            } catch (e) { console.error("Data Load Error", e); }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const cols = line.split(',');
                return headers.reduce((acc, h, i) => { acc[h] = cols[i]?.trim().replace(/"/g, ''); return acc; }, {});
            });
        }

        function renderRawOptions() {
            const sel = document.getElementById('rawMin');
            sel.innerHTML = '<option value="">구간 선택</option>';
            DB.p1.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.label; opt.textContent = r.label;
                sel.appendChild(opt);
            });
        }

        function calculate() {
            const rawKey = document.getElementById('rawMin').value;
            const finalMin = parseInt(document.getElementById('finalMin').value) || 0;
            const pkg = document.getElementById('package').value;
            const editPoint = document.getElementById('editPoint').value;
            const momentCnt = parseInt(document.getElementById('momentVal').value) || 0;
            const collabCnt = parseInt(document.getElementById('collabVal').value) || 0;

            if (!rawKey) { alert("원본 길이를 선택해주세요."); return; }

            const baseRow = DB.p1.find(r => r.label === rawKey);
            if (baseRow?.base_price === "문의 필요") { document.getElementById('totalText').textContent = "문의 필요"; return; }

            const priceRow = DB.p2.find(r => r.package === pkg && (pkg === 'economy' ? true : r.edit_point === editPoint));
            
            let basePrice = parseInt(baseRow?.base_price) || 0;
            let minPrice = parseInt(priceRow?.price_per_min) || 0;

            let total = basePrice + (minPrice * finalMin);

            const momentDef = DB.p3.find(d => d.label === '시점 추가');
            total += (momentCnt * (parseInt(momentDef?.value) || 30000));

            const collabDef = DB.p3.find(d => d.label === '합방 인원 추가');
            if (collabCnt >= 4) {
                total += (finalMin * (parseInt(collabDef?.value) || 2000) * (collabCnt - 3));
            }

            let multipliers = 1;
            const activeChips = document.querySelectorAll('#extraToggles .chip.is-active');
            activeChips.forEach(chip => {
                const def = DB.p3.find(d => d.label === chip.dataset.extra);
                if (def && def.type === 'mult') multipliers += (parseFloat(def.value) - 1);
            });

            total *= multipliers;
            document.getElementById('totalText').textContent = Math.round(total).toLocaleString() + "원";
            sendHeight();
        }

        document.getElementById('calcBtn').addEventListener('click', calculate);

        document.getElementById('extraToggles').addEventListener('click', (e) => {
            if (e.target.classList.contains('chip')) {
                const wasActive = e.target.classList.contains('is-active');
                if (e.target.dataset.group === 'rush') {
                    document.querySelectorAll('[data-group="rush"]').forEach(c => c.classList.remove('is-active'));
                }
                if (!wasActive) {
                    e.target.classList.add('is-active');
                } else if (e.target.dataset.group !== 'rush') {
                    e.target.classList.remove('is-active');
                }
                document.getElementById('totalText').textContent = "0원";
            }
        });

        document.getElementById('btnCopyForm').addEventListener('click', () => {
            const rawLabel = document.getElementById('rawMin').value || "구간 선택";
            const finalMin = document.getElementById('finalMin').value || "0";
            const pkgLabel = document.getElementById('package').options[document.getElementById('package').selectedIndex].text;
            const editPoint = document.getElementById('editPoint').options[document.getElementById('editPoint').selectedIndex].text;
            
            const activeExtras = Array.from(document.querySelectorAll('#extraToggles .chip.is-active')).map(c => c.textContent);
            const extraStr = activeExtras.length > 0 ? activeExtras.join(', ') : "없음";

            const copyTemplate = `[문의 양식]
- 원본 영상 길이: ${rawLabel}
- 희망 영상 길이: ${finalMin}분
- 희망 타입: ${pkgLabel}
- 편집점: ${editPoint}
- 추가 옵션: ${extraStr}
- 시점: ${document.getElementById('momentVal').value}개
- 합방 인원: ${parseInt(document.getElementById('collabVal').value) + 1}명
- 유튜브 채널 링크: ${document.getElementById('fChannel').value}
- 원본 영상 공유: ${document.getElementById('fFinalLen').value}
- 영상 콘셉트 및 레퍼런스 자료: ${document.getElementById('fConcept').value}
- 그 외 요구사항: ${document.getElementById('fEtc').value}

- 예상 총액: ${document.getElementById('totalText').textContent}`;

            navigator.clipboard.writeText(copyTemplate).then(() => {
                const toast = document.getElementById('formToast');
                toast.textContent = "복사 완료! 그대로 붙여넣으시면 됩니다.";
                setTimeout(() => toast.textContent = "", 3000);
            });
        });

        document.getElementById('btnResetForm').addEventListener('click', () => {
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
            document.getElementById('package').value = "premium";
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('is-active'));
            document.getElementById('totalText').textContent = "0원";
            sendHeight();
        });

        window.addEventListener('resize', sendHeight);
        setInterval(sendHeight, 1000);
        loadData();
    </script>
</body>
</html>
